<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
}

.box {
    width: 320px;
    margin: 120px auto;
    background: white;
    padding: 20px;
    box-shadow: 0 0 10px gray;
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    background: #1e40af;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="box">
    <h2>Admin Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>
</div>

</body>
</html>
